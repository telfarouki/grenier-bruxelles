<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F5F1E8">
  <title>Le Grenier de Bruxelles · Suivi des dépenses</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg: #F5F1E8;
      --surface: #FAF7F0;
      --surface-elevated: #FFFFFF;
      --ink: #2A2520;
      --ink-soft: #6B5D4F;
      --ink-muted: #9B8E7C;
      --line: #E5DCC8;
      --line-soft: #EFE7D5;
      --accent: #C65D3A;
      --accent-dark: #A8472A;
      --accent-soft: #F0DBD0;
      --brass: #B8860B;
      --success: #5C7A3D;
      --warning: #D4A017;
      --error: #B83A2A;
      --shadow-sm: 0 1px 2px rgba(42,37,32,0.04), 0 0 0 1px rgba(42,37,32,0.06);
      --shadow-md: 0 4px 16px rgba(42,37,32,0.08), 0 0 0 1px rgba(42,37,32,0.08);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    .display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; letter-spacing: -0.02em; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
    a { color: var(--accent); text-decoration: none; }

    .grain {
      background-image:
        radial-gradient(circle at 25% 25%, rgba(198,93,58,0.04) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(184,134,11,0.04) 0%, transparent 50%);
    }
    .card {
      background: var(--surface-elevated);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
    }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

    .input {
      width: 100%; padding: 12px 14px; border-radius: 8px;
      border: 1.5px solid var(--line); background: var(--surface-elevated);
      color: var(--ink); font-size: 16px; transition: all 0.15s ease; outline: none;
    }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(198,93,58,0.12); }
    .input::placeholder { color: var(--ink-muted); }
    .input.error { border-color: var(--error); }

    .btn {
      padding: 12px 20px; border-radius: 8px; font-weight: 500; font-size: 14px;
      transition: all 0.15s ease; display: inline-flex; align-items: center;
      justify-content: center; gap: 8px;
    }
    .btn-primary {
      background: var(--accent); color: white; padding: 14px 24px; font-size: 15px; font-weight: 600;
    }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-primary:disabled { background: var(--ink-muted); cursor: not-allowed; opacity: 0.7; }
    .btn-secondary {
      background: var(--surface-elevated); color: var(--ink); border: 1.5px solid var(--line);
    }
    .btn-secondary:hover { border-color: var(--ink-soft); background: var(--surface); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #4d6630; }
    .btn-danger { background: var(--error); color: white; }
    .btn-danger:hover { background: #9d3024; }
    .btn-ghost { color: var(--ink-muted); padding: 6px 8px; }
    .btn-ghost:hover { color: var(--ink); }

    .label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--ink); margin-bottom: 6px;
    }
    .label .required { color: var(--accent); }
    .field-error { font-size: 12px; color: var(--error); margin-top: 4px; }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto; padding: 20px 20px 0 20px;
    }
    .header-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .header-eyebrow {
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-muted); font-weight: 600;
    }
    .header-title {
      font-size: clamp(24px, 4vw, 32px); font-weight: 600; font-style: italic;
    }
    .header-subtitle {
      font-size: 13px; color: var(--ink-soft); margin-top: 2px;
    }
    .header-total {
      font-size: clamp(22px, 4vw, 30px); font-weight: 600; color: var(--accent); line-height: 1;
    }
    .header-count {
      font-size: 12px; color: var(--ink-soft); margin-top: 4px;
    }

    .nav-desktop {
      display: flex; gap: 4px; margin-top: 24px;
    }
    .nav-tab {
      padding: 10px 16px; font-size: 14px; font-weight: 500;
      color: var(--ink-soft); border-bottom: 2px solid transparent;
      margin-bottom: -1px; display: flex; align-items: center; gap: 6px;
      transition: all 0.15s ease;
    }
    .nav-tab:hover { color: var(--ink); }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .nav-mobile {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface-elevated); border-top: 1px solid var(--line);
      padding: 8px 4px env(safe-area-inset-bottom);
      display: flex; justify-content: space-around;
      z-index: 50; box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
    }
    .nav-mobile-item {
      flex: 1; padding: 8px 4px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: var(--ink-muted); font-size: 11px; font-weight: 500;
    }
    .nav-mobile-item.active { color: var(--accent); }
    .nav-mobile-item svg { width: 22px; height: 22px; }

    .mobile-title {
      margin-top: 18px; padding-bottom: 16px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 18px; font-weight: 500; font-style: italic;
    }

    main {
      max-width: 1100px; margin: 0 auto; padding: 24px 20px 120px 20px;
    }

    @media (max-width: 768px) {
      .desktop-only { display: none !important; }
    }
    @media (min-width: 769px) {
      .mobile-only { display: none !important; }
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .grid-cats { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
    .grid-charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }

    .chip {
      padding: 10px 12px; border-radius: 8px; font-size: 13px; font-weight: 500;
      border: 1.5px solid var(--line); background: var(--surface-elevated); color: var(--ink);
      display: flex; align-items: center; gap: 8px; text-align: left;
      transition: all 0.15s ease;
    }
    .chip-icon { font-size: 16px; }
    .chip.active-ink { background: var(--ink); color: white; border-color: var(--ink); }

    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--accent-soft); color: var(--accent-dark);
      padding: 4px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600;
    }

    .expense-row {
      background: var(--surface-elevated); border-radius: 10px; padding: 14px;
      box-shadow: var(--shadow-sm); display: flex; gap: 12px; align-items: center;
      transition: all 0.2s ease;
    }
    .expense-row:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .expense-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .expense-content { flex: 1; min-width: 0; }
    .expense-title {
      font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .expense-meta {
      font-size: 12px; color: var(--ink-soft);
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .expense-meta-sep { color: var(--ink-muted); }
    .expense-actions {
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    }
    .expense-amount {
      font-size: 16px; font-weight: 600; color: var(--ink);
    }

    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      color: white; padding: 12px 20px; border-radius: 999px;
      font-size: 14px; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      z-index: 100; display: flex; align-items: center; gap: 8px;
      animation: slideUp 0.3s ease-out;
    }
    .toast-success { background: var(--success); }
    .toast-error { background: var(--error); }
    .toast-warning { background: var(--warning); }
    .toast-info { background: var(--ink); }
    @keyframes slideUp {
      from { transform: translate(-50%, 20px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(42,37,32,0.5);
      z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      background: var(--surface-elevated); border-radius: 12px; padding: 24px;
      max-width: 400px; width: 100%; box-shadow: var(--shadow-md);
    }
    .photo-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .photo-modal-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,0.1); color: white;
      width: 40px; height: 40px; border-radius: 999px;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-modal-img {
      max-width: 90vw; max-height: 90vh; object-fit: contain;
      border-radius: 8px; box-shadow: var(--shadow-lg);
    }

    .empty-state {
      background: var(--surface-elevated); border-radius: 12px; padding: 60px 20px;
      text-align: center; max-width: 480px; margin: 40px auto;
      box-shadow: var(--shadow-sm);
    }
    .empty-state-icon {
      width: 80px; height: 80px; border-radius: 999px;
      background: var(--accent-soft); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .empty-state-title {
      font-size: 20px; font-weight: 600; font-style: italic; margin-bottom: 8px;
    }
    .empty-state-text {
      font-size: 14px; color: var(--ink-soft); line-height: 1.5;
    }

    .photo-preview {
      border: 1.5px solid var(--success); border-radius: 8px; padding: 12px;
      background: rgba(92,122,61,0.06);
      display: flex; align-items: center; gap: 12px;
    }
    .photo-preview img {
      width: 60px; height: 60px; object-fit: cover; border-radius: 6px;
    }

    .pulse {
      animation: pulse 1.4s ease-in-out infinite;
      color: var(--ink-soft); text-align: center; padding: 80px 20px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; background: var(--bg);
    }
    .login-card {
      background: var(--surface-elevated); border-radius: 16px; padding: 40px 32px;
      max-width: 400px; width: 100%; box-shadow: var(--shadow-md);
      text-align: center;
    }
    .login-icon {
      width: 64px; height: 64px; border-radius: 16px;
      background: var(--accent-soft); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }

    .breakdown-row { margin-bottom: 12px; }
    .breakdown-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 4px; font-size: 13px;
    }
    .breakdown-bar {
      height: 6px; background: var(--line-soft); border-radius: 3px; overflow: hidden;
    }
    .breakdown-fill {
      height: 100%; border-radius: 3px; transition: width 0.4s ease;
    }

    .filter-bar {
      background: var(--surface-elevated); border-radius: 12px; padding: 16px;
      box-shadow: var(--shadow-sm); margin-bottom: 16px;
    }
    .search-input {
      flex: 1; border: none; outline: none; font-size: 14px;
      background: transparent;
    }
    .filter-select {
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--line);
      background: var(--surface); font-size: 13px; color: var(--ink); cursor: pointer;
    }

    .live-indicator {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--success); font-weight: 600;
      padding: 2px 8px; background: rgba(92,122,61,0.1); border-radius: 999px;
      margin-left: 8px;
    }
    .live-dot {
      width: 6px; height: 6px; background: var(--success); border-radius: 50%;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

    // ============================================================
    //  ⚙️  CONFIGURATION — modifiez ces valeurs si besoin
    // ============================================================
    const SUPABASE_URL = 'https://othrpoortctyhagoaltk.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_whJa6OE4eq8px3pgnY4B7A_hhz_r0sW';

    // Mot de passe d'accès — CHANGEZ-LE et partagez-le avec votre superviseur
    const APP_PASSWORD = 'grenier2026';
    // ============================================================

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ----- Constantes métier -----
    const CATEGORIES = [
      { id: 'materials', label: 'Matériaux',                          short: 'Matériaux',     color: '#C65D3A', icon: '🪵' },
      { id: 'labor',     label: "Main-d'œuvre / sous-traitants",       short: "Main-d'œuvre",  color: '#5C7A3D', icon: '👷' },
      { id: 'tools',     label: 'Outils & équipement',                 short: 'Outils',        color: '#B8860B', icon: '🔧' },
      { id: 'utilities', label: 'Électricité / plomberie / chauffage', short: 'Élec/Plomb',    color: '#3D6B7A', icon: '⚡' },
      { id: 'permits',   label: 'Permis & frais administratifs',       short: 'Admin',         color: '#7A5C3D', icon: '📋' },
      { id: 'transport', label: 'Transport & livraison',               short: 'Transport',     color: '#8B5A8C', icon: '🚚' },
      { id: 'other',     label: 'Autres dépenses',                     short: 'Autres',        color: '#6B5D4F', icon: '📦' },
    ];
    const PAYMENT_METHODS = [
      { id: 'cash',     label: 'Espèces',  icon: '💵' },
      { id: 'card',     label: 'Carte',    icon: '💳' },
      { id: 'transfer', label: 'Virement', icon: '🏦' },
    ];
    const getCategory = (id) => CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1];
    const getPayment  = (id) => PAYMENT_METHODS.find(p => p.id === id) || PAYMENT_METHODS[0];

    // ----- État global -----
    const state = {
      view: 'add',
      expenses: [],
      loading: true,
      isAuthed: sessionStorage.getItem('grenier-auth') === 'ok',
      photoFile: null,
      photoPreview: null,
      formErrors: {},
      submitting: false,
      filterCategory: 'all',
      filterSearch: '',
      sortBy: 'date-desc',
      modalPhoto: null,
      modalDeleteId: null,
      chartCategory: null,
      chartMonthly: null,
    };

    // ----- Utilitaires de formatage -----
    const fmtEUR = (v) => new Intl.NumberFormat('fr-BE', { style: 'currency', currency: 'EUR' }).format(v || 0);
    const fmtDate = (d) => new Intl.DateTimeFormat('fr-BE', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(new Date(d));
    const todayISO = () => {
      const t = new Date();
      const y = t.getFullYear();
      const m = String(t.getMonth() + 1).padStart(2, '0');
      const d = String(t.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };
    const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    // ----- Compression d'image -----
    async function compressImage(file, maxDim = 1600, quality = 0.78) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width > maxDim || height > maxDim) {
              if (width > height) {
                height = Math.round((height * maxDim) / width);
                width = maxDim;
              } else {
                width = Math.round((width * maxDim) / height);
                height = maxDim;
              }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            canvas.toBlob(
              (blob) => blob ? resolve(blob) : reject(new Error('Compression failed')),
              'image/jpeg',
              quality
            );
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ----- Accès données Supabase -----
    async function loadExpenses() {
      const { data, error } = await supabase
        .from('expenses')
        .select('*')
        .order('date', { ascending: false })
        .order('created_at', { ascending: false });
      if (error) {
        console.error('Erreur chargement dépenses :', error);
        showToast('Erreur de chargement : ' + error.message, 'error');
        return;
      }
      state.expenses = data || [];
      state.loading = false;
      render();
    }

    async function uploadPhoto(blob) {
      const filename = `receipt_${Date.now()}_${Math.random().toString(36).slice(2, 8)}.jpg`;
      const { error } = await supabase.storage
        .from('receipts')
        .upload(filename, blob, { contentType: 'image/jpeg', cacheControl: '3600' });
      if (error) throw error;
      return filename;
    }

    function getPhotoUrl(path) {
      if (!path) return null;
      const { data } = supabase.storage.from('receipts').getPublicUrl(path);
      return data.publicUrl;
    }

    async function deletePhoto(path) {
      if (!path) return;
      try {
        await supabase.storage.from('receipts').remove([path]);
      } catch (e) {
        console.warn('Photo delete failed:', e);
      }
    }

    async function addExpense(data) {
      let photoPath = null;
      if (state.photoFile) {
        try {
          const compressed = await compressImage(state.photoFile);
          photoPath = await uploadPhoto(compressed);
        } catch (err) {
          console.error('Photo upload error:', err);
          showToast('Erreur upload photo, dépense quand même enregistrée', 'warning');
        }
      }
      const { error } = await supabase.from('expenses').insert({
        date: data.date,
        amount: data.amount,
        description: data.description,
        category: data.category,
        supplier: data.supplier || null,
        payment_method: data.paymentMethod,
        photo_path: photoPath,
      });
      if (error) {
        showToast('Erreur d\'enregistrement : ' + error.message, 'error');
        if (photoPath) await deletePhoto(photoPath);
        return false;
      }
      await loadExpenses();
      showToast('Dépense ajoutée ✓', 'success');
      return true;
    }

    async function deleteExpense(id) {
      const exp = state.expenses.find(e => e.id === id);
      const { error } = await supabase.from('expenses').delete().eq('id', id);
      if (error) {
        showToast('Erreur de suppression : ' + error.message, 'error');
        return;
      }
      if (exp?.photo_path) await deletePhoto(exp.photo_path);
      await loadExpenses();
      showToast('Dépense supprimée', 'success');
    }

    // ----- Toast notifications -----
    let toastTimer;
    function showToast(message, type = 'info') {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      clearTimeout(toastTimer);
      const div = document.createElement('div');
      div.className = `toast toast-${type}`;
      const icons = { success: '✓', error: '⚠', warning: '⚠', info: 'ℹ' };
      div.innerHTML = `<span>${icons[type] || ''}</span> ${escapeHtml(message)}`;
      document.body.appendChild(div);
      toastTimer = setTimeout(() => div.remove(), 3000);
    }

    // ----- Auth simple par mot de passe -----
    function tryLogin(password) {
      if (password === APP_PASSWORD) {
        sessionStorage.setItem('grenier-auth', 'ok');
        state.isAuthed = true;
        render();
        loadExpenses();
        setupRealtime();
        return true;
      }
      return false;
    }

    // ----- Subscription temps réel -----
    let realtimeChannel = null;
    function setupRealtime() {
      if (realtimeChannel) return;
      realtimeChannel = supabase
        .channel('expenses-realtime')
        .on('postgres_changes',
            { event: '*', schema: 'public', table: 'expenses' },
            () => loadExpenses())
        .subscribe();
    }

    // ============================================================
    //  RENDERING
    // ============================================================
    const app = document.getElementById('app');

    function render() {
      if (!state.isAuthed) {
        app.innerHTML = renderLogin();
        attachLoginHandlers();
        return;
      }
      app.innerHTML = `
        ${renderHeader()}
        <main>
          ${state.loading ? '<div class="pulse">Chargement…</div>' : renderCurrentView()}
        </main>
        ${renderBottomNav()}
      `;
      attachHandlers();
      if (state.modalPhoto) renderPhotoModal();
      if (state.modalDeleteId) renderDeleteModal();
      if (state.view === 'dashboard' && !state.loading) requestAnimationFrame(initCharts);
    }

    function renderCurrentView() {
      switch (state.view) {
        case 'add':       return renderAddView();
        case 'list':      return renderListView();
        case 'dashboard': return renderDashboardView();
        case 'export':    return renderExportView();
        default: return '';
      }
    }

    // ----- Login -----
    function renderLogin() {
      return `
        <div class="login-screen">
          <div class="login-card">
            <div class="login-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 12 L12 4 L21 12 L21 20 L3 20 Z"/>
                <rect x="9" y="13" width="6" height="7"/>
                <line x1="12" y1="13" x2="12" y2="20"/>
                <line x1="9" y1="16.5" x2="15" y2="16.5"/>
              </svg>
            </div>
            <div class="header-eyebrow" style="margin-bottom:8px;">Projet d'innovation</div>
            <h1 class="display" style="font-size:26px;font-weight:600;font-style:italic;margin-bottom:6px;">
              Le Grenier de Bruxelles
            </h1>
            <p style="color:var(--ink-soft);font-size:14px;margin-bottom:28px;">
              Suivi des dépenses de rénovation
            </p>
            <input id="login-password" type="password" placeholder="Mot de passe d'accès"
              class="input" autocomplete="current-password" style="margin-bottom:12px;text-align:center;"/>
            <button id="login-button" class="btn btn-primary" style="width:100%;">
              Se connecter
            </button>
            <div id="login-error" style="margin-top:12px;color:var(--error);font-size:13px;height:16px;"></div>
          </div>
        </div>
      `;
    }

    function attachLoginHandlers() {
      const submit = () => {
        const pwd = document.getElementById('login-password').value;
        if (!tryLogin(pwd)) {
          document.getElementById('login-error').textContent = 'Mot de passe incorrect';
          document.getElementById('login-password').value = '';
        }
      };
      document.getElementById('login-button').addEventListener('click', submit);
      document.getElementById('login-password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submit();
      });
      document.getElementById('login-password').focus();
    }

              <div style="text-align:right;">
                <div class="header-eyebrow" style="margin-bottom:4px;">Total dépensé</div>
                <div class="mono display header-total">${fmtEUR(total)}</div>

    // ----- List view -----
    function renderListView() {
      if (state.expenses.length === 0) {
        return renderEmptyState('🧾', 'Aucune dépense enregistrée',
          'Commencez par ajouter votre première dépense de rénovation.');
      }
      let list = [...state.expenses];
      if (state.filterCategory !== 'all') list = list.filter(e => e.category === state.filterCategory);
      if (state.filterSearch.trim()) {
        const q = state.filterSearch.toLowerCase();
        list = list.filter(e =>
          (e.description || '').toLowerCase().includes(q) ||
          (e.supplier || '').toLowerCase().includes(q));
      }
      switch (state.sortBy) {
        case 'date-desc':   list.sort((a, b) => b.date.localeCompare(a.date)); break;
        case 'date-asc':    list.sort((a, b) => a.date.localeCompare(b.date)); break;
        case 'amount-desc': list.sort((a, b) => b.amount - a.amount); break;
        case 'amount-asc':  list.sort((a, b) => a.amount - b.amount); break;
      }
      const filteredTotal = list.reduce((s, e) => s + Number(e.amount), 0);

      return `
        <div class="filter-bar">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">

              <option value="date-asc"  ${state.sortBy === 'date-asc' ? 'selected' : ''}>Date ↑ (ancien)</option>
              <option value="amount-desc" ${state.sortBy === 'amount-desc' ? 'selected' : ''}>Montant ↓</option>
              <option value="amount-asc"  ${state.sortBy === 'amount-asc' ? 'selected' : ''}>Montant ↑</option>

              <span style="font-size:13px;color:var(--ink-soft);">

    // ----- Dashboard -----
    function renderDashboardView() {
      if (state.expenses.length === 0) {
        return renderEmptyState('📊', 'Tableau de bord vide',
          'Vos statistiques apparaîtront ici dès la première dépense.');
      }
      const total = state.expenses.reduce((s, e) => s + Number(e.amount), 0);
      const byCat = CATEGORIES.map(cat => {
        const items = state.expenses.filter(e => e.category === cat.id);
        return { ...cat, total: items.reduce((s, e) => s + Number(e.amount), 0), count: items.length };
      });
      const byPay = PAYMENT_METHODS.map(p => {
        const items = state.expenses.filter(e => e.payment_method === p.id);
        return { ...p, total: items.reduce((s, e) => s + Number(e.amount), 0), count: items.length };
      });
      const avg = state.expenses.length ? total / state.expenses.length : 0;
      const activeCats = byCat.filter(c => c.count > 0).length;

      return `
        <div style="display:flex;flex-direction:column;gap:16px;">
          <div class="grid-kpi">
            ${renderKpi('Total cumulé', fmtEUR(total), 'var(--accent)')}
            ${renderKpi('Nombre de dépenses', String(state.expenses.length), 'var(--ink)')}
            ${renderKpi('Dépense moyenne', fmtEUR(avg), 'var(--brass)')}
            ${renderKpi('Catégories actives', String(activeCats), 'var(--success)')}
          </div>
          <div class="grid-charts">
            <div class="card" style="padding:20px;">
              <h3 class="display" style="font-size:16px;font-weight:600;font-style:italic;margin-bottom:16px;">

            </div>
            <div class="card" style="padding:20px;">
              <h3 class="display" style="font-size:16px;font-weight:600;font-style:italic;margin-bottom:16px;">
                Évolution mensuelle
              </h3>
              <div style="position:relative;height:240px;">
                <canvas id="chart-monthly"></canvas>
              </div>
            </div>
          </div>
          <div class="card" style="padding:20px;">
            <h3 class="display" style="font-size:16px;font-weight:600;font-style:italic;margin-bottom:16px;">
              Détail par catégorie
            </h3>
            ${byCat.sort((a, b) => b.total - a.total).map(cat => {
              const pct = total > 0 ? (cat.total / total) * 100 : 0;
              return `
                <div class="breakdown-row">
                  <div class="breakdown-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                      <span>${cat.icon}</span>
                      <span style="font-weight:500;">${cat.short}</span>
                      <span style="color:var(--ink-muted);font-size:12px;">· ${cat.count}</span>
                    </div>
                    <span class="mono" style="font-weight:600;">
                      ${fmtEUR(cat.total)}
                      <span style="color:var(--ink-muted);font-size:11px;margin-left:6px;">${pct.toFixed(1)}%</span>
                    </span>
                  </div>
                  <div class="breakdown-bar">
                    <div class="breakdown-fill" style="width:${pct}%;background:${cat.color};"></div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="card" style="padding:20px;">
            <h3 class="display" style="font-size:16px;font-weight:600;font-style:italic;margin-bottom:16px;">
              Modes de paiement
            </h3>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;">
              ${byPay.map(p => `
                <div style="background:var(--surface);padding:14px;border-radius:8px;border:1px solid var(--line-soft);">
                  <div style="font-size:12px;color:var(--ink-soft);margin-bottom:4px;">
                    ${p.icon} ${p.label}
                  </div>
                  <div class="mono" style="font-size:18px;font-weight:600;">${fmtEUR(p.total)}</div>
                  <div style="font-size:11px;color:var(--ink-muted);margin-top:2px;">
                    ${p.count} transaction${p.count !== 1 ? 's' : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderKpi(label, value, color) {
      return `
        <div class="card" style="padding:16px;">
          <div class="header-eyebrow" style="margin-bottom:6px;">${label}</div>
          <div class="mono" style="font-size:22px;font-weight:600;color:${color};">${value}</div>
        </div>
      `;
    }

    function initCharts() {
      const total = state.expenses.reduce((s, e) => s + Number(e.amount), 0);
      const byCat = CATEGORIES.map(cat => {
        const items = state.expenses.filter(e => e.category === cat.id);
        return { ...cat, total: items.reduce((s, e) => s + Number(e.amount), 0) };
      }).filter(c => c.total > 0);

      // Pie chart
      const elCat = document.getElementById('chart-category');
      if (elCat) {
        if (state.chartCategory) state.chartCategory.destroy();
        state.chartCategory = new Chart(elCat, {
          type: 'doughnut',
          data: {
            labels: byCat.map(c => c.short),
            datasets: [{
              data: byCat.map(c => c.total),
              backgroundColor: byCat.map(c => c.color),
              borderColor: '#FFFFFF',
              borderWidth: 2,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '60%',
            plugins: {
              legend: { position: 'bottom', labels: { font: { family: 'Plus Jakarta Sans', size: 11 }, padding: 10, boxWidth: 10 } },
              tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${fmtEUR(ctx.parsed)}` } },
            },
          },
        });
      }

      // Monthly chart
      const elMon = document.getElementById('chart-monthly');
      if (elMon) {
        const map = new Map();
        state.expenses.forEach(e => {
          const k = e.date.slice(0, 7);
          map.set(k, (map.get(k) || 0) + Number(e.amount));
        });
        const sorted = [...map.entries()].sort((a, b) => a[0].localeCompare(b[0])).slice(-6);
        const months = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Jun', 'Jul', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
        const labels = sorted.map(([k]) => {
          const [y, m] = k.split('-');
          return `${months[parseInt(m) - 1]} ${y.slice(2)}`;
        });
        const data = sorted.map(([, v]) => Math.round(v));
        if (state.chartMonthly) state.chartMonthly.destroy();
        state.chartMonthly = new Chart(elMon, {
          type: 'bar',
          data: { labels, datasets: [{ data, backgroundColor: '#C65D3A', borderRadius: 6, maxBarThickness: 50 }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: (ctx) => fmtEUR(ctx.parsed.y) } },
            },
            scales: {
              x: { grid: { display: false }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11 } } },
              y: { grid: { color: '#E5DCC8' }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11 }, callback: (v) => fmtEUR(v) } },
            },
          },
        });
      }
    }

              fournisseur, mode de paiement). Compatible Excel, LibreOffice et tout logiciel de comptabilité.
            </p>
            <button id="btn-csv" class="btn btn-primary" ${state.expenses.length === 0 ? 'disabled' : ''}>
              ⬇ Télécharger le CSV (${state.expenses.length} dépenses)
            </button>
          </div>

          <div class="card" style="padding:24px;">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
              <div style="width:44px;height:44px;border-radius:10px;background:rgba(92,122,61,0.12);
                color:var(--success);display:flex;align-items:center;justify-content:center;font-size:22px;">📦</div>
              <div>
                <h3 class="display" style="font-size:18px;font-weight:600;font-style:italic;">
                  Sauvegarde JSON (toutes les données)
                </h3>
                <p style="font-size:13px;color:var(--ink-soft);margin-top:2px;">
                  Conservez sur votre ordinateur — recommandé chaque semaine
                </p>
              </div>
            </div>
            <p style="font-size:14px;color:var(--ink-soft);line-height:1.6;margin-bottom:12px;">
              Téléchargez un fichier JSON contenant toutes les données + les liens vers les photos.
              Stockez-le dans un dossier dédié de votre ordinateur (ex : <em>Documents/Grenier Bruxelles/</em>).
            </p>
            <div style="background:var(--surface);border:1px solid var(--line-soft);padding:12px;
              border-radius:8px;margin-bottom:16px;font-size:13px;color:var(--ink-soft);">
              📦 Contenu : <strong>${state.expenses.length} dépenses</strong> · <strong>${photoCount} photos</strong>
            </div>
            <button id="btn-backup" class="btn btn-success" ${state.expenses.length === 0 ? 'disabled' : ''}>
              ⬇ Télécharger la sauvegarde JSON
            </button>
          </div>

          <div style="background:rgba(184,134,11,0.08);border:1px solid rgba(184,134,11,0.25);
            border-radius:10px;padding:16px;font-size:13px;color:var(--ink);line-height:1.6;">
            <div style="display:flex;gap:10px;align-items:flex-start;">
              <span style="font-size:18px;">💡</span>
              <div>
                <strong>Conseil :</strong> Effectuez une sauvegarde JSON au moins
                <strong>une fois par semaine</strong>. Stockez-la dans un dossier dédié de
                votre ordinateur (ex&nbsp;: <em>Documents/Grenier Bruxelles/Sauvegardes</em>),
                avec une copie sur clé USB ou disque externe pour plus de sécurité.
              </div>
            </div>
          </div>

          <div class="card" style="padding:20px;">
            <h3 class="display" style="font-size:16px;font-weight:600;font-style:italic;margin-bottom:8px;">
              Se déconnecter
            </h3>
            <p style="font-size:13px;color:var(--ink-soft);margin-bottom:16px;">
              Pour exiger à nouveau le mot de passe à la prochaine ouverture.
            </p>
            <button id="btn-logout" class="btn btn-secondary">Se déconnecter</button>
          </div>
        </div>
      `;
    }

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function exportCSV() {
      const BOM = '\uFEFF';
      const header = ['Date', 'Montant (EUR)', 'Description', 'Catégorie', 'Fournisseur', 'Mode de paiement', 'Lien photo'];
      const rows = state.expenses.map(e => [
        e.date,
        String(e.amount).replace('.', ','),
        `"${(e.description || '').replace(/"/g, '""')}"`,
        `"${getCategory(e.category).label}"`,
        `"${(e.supplier || '').replace(/"/g, '""')}"`,
        getPayment(e.payment_method).label,
        e.photo_path ? getPhotoUrl(e.photo_path) : '',
      ]);
      const csv = BOM + [header.join(';'), ...rows.map(r => r.join(';'))].join('\r\n');
      downloadFile(`grenier-bruxelles-depenses-${todayISO()}.csv`, csv, 'text/csv;charset=utf-8');
    }

    function exportBackup() {
      const backup = {
        project: 'Le Grenier de Bruxelles',
        exportedAt: new Date().toISOString(),
        version: 1,
        expenses: state.expenses.map(e => ({
          ...e,
          photo_url: e.photo_path ? getPhotoUrl(e.photo_path) : null,
        })),
      };
      downloadFile(
        `grenier-bruxelles-sauvegarde-${todayISO()}.json`,
        JSON.stringify(backup, null, 2),
        'application/json',
      );
    }

    // ----- Modals -----
    function renderPhotoModal() {
      const url = getPhotoUrl(state.modalPhoto);
      const div = document.createElement('div');
      div.className = 'photo-modal-overlay';
      div.innerHTML = `
        <button class="photo-modal-close" id="photo-close">✕</button>
        <img class="photo-modal-img" src="${url}" alt="Facture"/>
      `;
      div.addEventListener('click', (e) => {
        if (e.target === div || e.target.id === 'photo-close') {
          state.modalPhoto = null; div.remove();
        }
      });
      document.body.appendChild(div);
    }

    function renderDeleteModal() {
      const div = document.createElement('div');
      div.className = 'modal-overlay';
      div.innerHTML = `
        <div class="modal">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <span style="color:var(--error);font-size:20px;">⚠</span>
            <h3 class="display" style="font-size:18px;font-weight:600;font-style:italic;">
              Supprimer cette dépense ?
            </h3>
          </div>
          <p style="font-size:14px;color:var(--ink-soft);margin-bottom:20px;line-height:1.5;">
            Cette action est irréversible. La photo sera également supprimée.
          </p>
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button id="del-cancel" class="btn btn-secondary">Annuler</button>
            <button id="del-confirm" class="btn btn-danger">Supprimer</button>
          </div>
        </div>
      `;
      div.addEventListener('click', async (e) => {
        if (e.target.id === 'del-cancel' || e.target === div) {
          state.modalDeleteId = null; div.remove();
        } else if (e.target.id === 'del-confirm') {
          const id = state.modalDeleteId;
          state.modalDeleteId = null; div.remove();
          await deleteExpense(id);
        }
      });
      document.body.appendChild(div);
    }

    function renderEmptyState(icon, title, text) {
      return `
        <div class="empty-state">
          <div class="empty-state-icon" style="font-size:36px;">${icon}</div>
          <h3 class="display empty-state-title">${title}</h3>
          <p class="empty-state-text">${text}</p>
        </div>
      `;
    }

    // ----- Event handlers -----
    function attachHandlers() {
      // Nav (desktop + mobile)
      document.querySelectorAll('[data-view]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.view = btn.dataset.view;
          state.formErrors = {};
          render();
        });
      });

      if (state.view === 'add') attachAddHandlers();
      if (state.view === 'list') attachListHandlers();
      if (state.view === 'export') attachExportHandlers();
    }

    function attachAddHandlers() {
      // Highlight category buttons
      function updateCatButtons() {
        const sel = document.getElementById('f-category').value;
        document.querySelectorAll('.cat-chip').forEach(b => {
          if (b.dataset.id === sel) {
            b.style.background = b.dataset.color;
            b.style.borderColor = b.dataset.color;
            b.style.color = 'white';
          } else {
            b.style.background = ''; b.style.borderColor = ''; b.style.color = '';
          }
        });
      }
      function updatePayButtons() {
        const sel = document.getElementById('f-payment').value;
        document.querySelectorAll('.pay-chip').forEach(b => {
          if (b.dataset.id === sel) b.classList.add('active-ink');
          else b.classList.remove('active-ink');
        });
      }
      updateCatButtons(); updatePayButtons();

      document.querySelectorAll('.cat-chip').forEach(b => {
        b.addEventListener('click', () => {
          document.getElementById('f-category').value = b.dataset.id;
          updateCatButtons();
        });
      });
      document.querySelectorAll('.pay-chip').forEach(b => {
        b.addEventListener('click', () => {
          document.getElementById('f-payment').value = b.dataset.id;
          updatePayButtons();
        });
      });

      // Photo handling
      const camera = document.getElementById('photo-camera');
      const upload = document.getElementById('photo-upload');
      const btnCamera = document.getElementById('btn-camera');
      const btnUpload = document.getElementById('btn-upload');
      const btnRemove = document.getElementById('photo-remove');

      if (btnCamera) btnCamera.addEventListener('click', () => camera.click());
      if (btnUpload) btnUpload.addEventListener('click', () => upload.click());

      const handleFile = async (file) => {
        if (!file) return;
        state.photoFile = file;
        state.photoPreview = await new Promise((res) => {
          const r = new FileReader();
          r.onload = (e) => res(e.target.result);
          r.readAsDataURL(file);
        });
        render();
      };
      if (camera) camera.addEventListener('change', (e) => handleFile(e.target.files[0]));
      if (upload) upload.addEventListener('change', (e) => handleFile(e.target.files[0]));
      if (btnRemove) btnRemove.addEventListener('click', () => {
        state.photoFile = null; state.photoPreview = null; render();
      });

      // Form submit
      document.getElementById('expense-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errors = {};
        const date = document.getElementById('f-date').value;
        const amountStr = document.getElementById('f-amount').value;
        const description = document.getElementById('f-description').value.trim();
        const category = document.getElementById('f-category').value;
        const supplier = document.getElementById('f-supplier').value.trim();
        const paymentMethod = document.getElementById('f-payment').value;
        const amount = parseFloat(amountStr.replace(',', '.'));

        if (!date) errors.date = 'Date requise';
        if (!amountStr || isNaN(amount) || amount <= 0) errors.amount = 'Montant invalide';
        if (!description) errors.description = 'Description requise';

        if (Object.keys(errors).length) {
          state.formErrors = errors; render(); return;
        }

        state.formErrors = {}; state.submitting = true; render();
        const ok = await addExpense({ date, amount, description, category, supplier, paymentMethod });
        state.submitting = false;
        if (ok) {
          state.photoFile = null; state.photoPreview = null;
          render();
        } else {
          render();
        }
      });
    }

    function attachListHandlers() {
      const search = document.getElementById('search-input');
      if (search) {
        search.addEventListener('input', (e) => {
          state.filterSearch = e.target.value;
          // Re-render only the list portion isn't trivial; do full render
          render();
          // restore focus + cursor
          const newSearch = document.getElementById('search-input');
          if (newSearch) {
            newSearch.focus();
            newSearch.setSelectionRange(newSearch.value.length, newSearch.value.length);
          }
        });
      }
      const filterCat = document.getElementById('filter-cat');
      if (filterCat) filterCat.addEventListener('change', (e) => {
        state.filterCategory = e.target.value; render();
      });
      const filterSort = document.getElementById('filter-sort');
      if (filterSort) filterSort.addEventListener('change', (e) => {
        state.sortBy = e.target.value; render();
      });
      document.querySelectorAll('.view-photo').forEach(btn => {
        btn.addEventListener('click', () => {
          state.modalPhoto = btn.dataset.path; renderPhotoModal();
        });
      });
      document.querySelectorAll('.del-expense').forEach(btn => {
        btn.addEventListener('click', () => {
          state.modalDeleteId = btn.dataset.id; renderDeleteModal();
        });
      });
    }

    function attachExportHandlers() {
      const csv = document.getElementById('btn-csv');
      const bk = document.getElementById('btn-backup');
      const lo = document.getElementById('btn-logout');
      if (csv) csv.addEventListener('click', exportCSV);
      if (bk) bk.addEventListener('click', exportBackup);
      if (lo) lo.addEventListener('click', () => {
        sessionStorage.removeItem('grenier-auth');
        state.isAuthed = false;
        if (realtimeChannel) { supabase.removeChannel(realtimeChannel); realtimeChannel = null; }
        render();
      });
    }

    // ----- SVG icons (inline) -----
    function iconPlus()     { return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>`; }
    function iconList()     { return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>`; }
    function iconChart()    { return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18M7 14l4-4 4 4 5-5"/></svg>`; }
    function iconDownload() { return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>`; }

    // ----- Initial bootstrap -----
    render();
    if (state.isAuthed) {
      loadExpenses();
      setupRealtime();
    }
  </script>
</body>
</html>
